name: test
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
on:
    pull_request: { types: [opened, reopened, synchronize, ready_for_review] }
    push: { branches: [main] }

env:
    LOG_LEVEL: info
    SWIFT_DETERMINISTIC_HASHING: 1
jobs:
    test:
        services:
            ssh-server:
                image: lscr.io/linuxserver/openssh-server:latest
                ports:
                    - 2222:2222
                env:
                    USER_NAME: citadel
                    USER_PASSWORD: hunter2
                    PASSWORD_ACCESS: true
                    DOCKER_MODS: linuxserver/mods:openssh-server-ssh-tunnel
        runs-on: ubuntu-latest
        strategy:
            matrix:
                image: ["swift:6.1", "swift:6.2", "swift:6.3"]
        container:
            image: ${{ matrix.image }}
        steps:
            - uses: actions/checkout@v4
            - name: Resolve
              run: swift package resolve
            - name: Generate test SSH key with high bcrypt rounds
              run: ssh-keygen -t ed25519 -a 100 -N "citadel-test-passphrase" -f /tmp/citadel_test_ed25519 -C "test@ci"
            - name: Run tests
              run: swift test
              env:
                SWIFT_DETERMINISTIC_HASHING: 1
                SSH_HOST: ssh-server
                SSH_PORT: 2222
                SSH_USERNAME: citadel
                SSH_PASSWORD: hunter2
                SSH_TEST_ED25519_KEY_PATH: /tmp/citadel_test_ed25519
                SSH_TEST_ED25519_PASSPHRASE: citadel-test-passphrase
